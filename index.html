<style>

<div id="root"></div>
<script>
(function() {
var h = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

var C = {
bg:”#0F0E0C”,surface:”#1C1A16”,elevated:”#252218”,
border:”#3A3528”,borderHi:”#6B6040”,
gold:”#E8B84B”,goldDim:”#A07E30”,
white:”#F5F0E8”,muted:”#9B9180”,subtle:”#6B6352”,
green:”#6FCF8A”,red:”#E07060”,blue:”#7AB8D4”,tan:”#C8B878”
};

// –– Peak model ––
var BASE_PEAKS={“1”:4,“1.5”:4.5,“2”:5,“3”:6,“4”:7,“5”:8,“6”:9,“8”:11,“10”:14};
var BKEYS=Object.keys(BASE_PEAKS).map(Number).sort(function(a,b){return a-b;});
function baseHours(ratio){
if(ratio<=BKEYS[0])return BASE_PEAKS[BKEYS[0]];
if(ratio>=BKEYS[BKEYS.length-1])return BASE_PEAKS[BKEYS[BKEYS.length-1]];
for(var i=0;i<BKEYS.length-1;i++){
var lo=BKEYS[i],hi=BKEYS[i+1];
if(ratio>=lo&&ratio<=hi)return BASE_PEAKS[lo]+(ratio-lo)/(hi-lo)*(BASE_PEAKS[hi]-BASE_PEAKS[lo]);
}
return 8;
}
function peakHours(ratio,tempC,fm,bias){fm=fm||1;bias=bias||1;return baseHours(ratio)*Math.pow(2,-(tempC-20)/5.5)*fm*bias;}
var CANDIDATES=[1,1.5,2,3,4,5,6,8,10];
function suggestRatio(hours,tempC,fm,bias){
fm=fm||1;bias=bias||1;
var best=CANDIDATES[0],bestDiff=Infinity;
for(var i=0;i<CANDIDATES.length;i++){var diff=Math.abs(peakHours(CANDIDATES[i],tempC,fm,bias)-hours);if(diff<bestDiff){bestDiff=diff;best=CANDIDATES[i];}}
return best;
}

// –– Flour ––
var BASE_FLOUR={
ap:{label:“Plain / All-purpose”,mult:1},
bread:{label:“Baker’s / Bread flour”,mult:0.95},
wm:{label:“Wholemeal / Whole wheat”,mult:0.86},
rye:{label:“Rye (100%)”,mult:0.9}
};
var BOOST_FLOURS=[
{id:“none”,label:“None”,spd:0},
{id:“rye”,label:“Rye \u26A1 rocket fuel”,spd:0.006},
{id:“wm”,label:“Wholemeal”,spd:0.005},
{id:“spelt”,label:“Spelt”,spd:0.003}
];
function flourMult(baseKey,boostId,boostPct){
var base=(BASE_FLOUR[baseKey]||{mult:1}).mult;
var boost=BOOST_FLOURS.filter(function(f){return f.id===boostId;})[0];
if(!boost||boostPct===0)return base;
return base*(1-boost.spd*boostPct);
}
function flourDesc(baseKey,boostId,boostPct){
var b=(BASE_FLOUR[baseKey]||{label:“Plain”}).label;
if(boostId===“none”||boostPct===0)return b;
var bo=BOOST_FLOURS.filter(function(f){return f.id===boostId;})[0];
return (100-boostPct)+”% “+b.split(”/”)[0].trim()+” + “+boostPct+”% “+(bo?bo.label.split(” “)[0]:””);
}

// –– Feed calc ––
function calcFeedFromSeed(seedG,ratio,hyd){var flour=Math.round(seedG*ratio),water=Math.round(flour*hyd);return {seed:seedG,flour:flour,water:water,total:seedG+flour+water};}
function calcFeedForTarget(targetTotal,ratio,hyd){
var parts=1+ratio+ratio*hyd,seed=Math.round(targetTotal/parts),flour=Math.round(seed*ratio),water=Math.round(flour*hyd);
return {seed:seed,flour:flour,water:water,total:seed+flour+water};
}

// –– Time ––
var TIMEZONES=[
{label:“Sydney / Melbourne (AEDT)”,tz:“Australia/Sydney”},
{label:“Brisbane (AEST)”,tz:“Australia/Brisbane”},
{label:“Adelaide (ACDT)”,tz:“Australia/Adelaide”},
{label:“Perth (AWST)”,tz:“Australia/Perth”},
{label:“Darwin (ACST)”,tz:“Australia/Darwin”},
{label:“Hobart (AEDT)”,tz:“Australia/Hobart”},
{label:“Auckland (NZDT)”,tz:“Pacific/Auckland”},
{label:“London (GMT/BST)”,tz:“Europe/London”},
{label:“Paris / Berlin (CET/CEST)”,tz:“Europe/Paris”},
{label:“New York (ET)”,tz:“America/New_York”},
{label:“Los Angeles (PT)”,tz:“America/Los_Angeles”},
{label:“Tokyo (JST)”,tz:“Asia/Tokyo”},
{label:“UTC”,tz:“UTC”}
];
function detectTimezone(){try{return Intl.DateTimeFormat().resolvedOptions().timeZone;}catch(e){return “Australia/Sydney”;}}
function nowInTz(tz){var s=new Intl.DateTimeFormat(“en-AU”,{timeZone:tz,hour:“2-digit”,minute:“2-digit”,hour12:false}).format(new Date());return s.replace(/^24:/,“00:”);}
function fmtDisplay(t,tz){if(!t)return “\u2014”;var p=t.split(”:”);var d=new Date();d.setHours(+p[0],+p[1],0,0);return new Intl.DateTimeFormat(“en-AU”,{timeZone:tz,hour:“numeric”,minute:“2-digit”,hour12:true}).format(d);}
function addHoursToStr(t,hrs){if(!t)return null;var p=t.split(”:”);var w=((+p[0]*60+ +p[1]+Math.round(hrs*60))%1440+1440)%1440;return pad2(Math.floor(w/60))+”:”+pad2(w%60);}
function hoursBetween(a,b){var pa=a.split(”:”),pb=b.split(”:”);var diff=(+pb[0]*60+ +pb[1])-(+pa[0]*60+ +pa[1]);if(diff<0)diff+=1440;return diff/60;}
function pad2(n){return n<10?“0”+n:””+n;}
function fmtH(h){if(h<=0)return “\u2014”;var hrs=Math.floor(h),mins=Math.round((h-hrs)*60);if(hrs===0)return mins+“m”;if(mins===0)return hrs+“h”;return hrs+“h “+mins+“m”;}
function fmtRatio(r){return “1 : “+r+” : “+r;}
function parseRatioStr(s){var p=s.split(”:”).map(function(x){return parseFloat(x.trim());});if(p.length===3&&p.every(function(n){return !isNaN(n)&&n>0;}))return p[1]/p[0];return null;}

// –– Storage ––
var LS_KEY=“sourdough_starter”;
var OLD_KEYS=[“sourdough_calc_v1”,“sourdough_calc_v2”,“sourdough_calc_v3”,“sourdough_calc_v4”];
function loadStorage(){
try{
var r=localStorage.getItem(LS_KEY);
if(r)return JSON.parse(r);
for(var i=0;i<OLD_KEYS.length;i++){var old=localStorage.getItem(OLD_KEYS[i]);if(old){var d=JSON.parse(old);saveStorage(d);return d;}}
return null;
}catch(e){return null;}
}
function saveStorage(d){try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}}

// –– Bias ––
var NUDGE=0.03;
function applyFeedback(bias,outcome){if(outcome===“early”)return Math.max(bias-NUDGE,0.5);if(outcome===“late”)return Math.min(bias+NUDGE,1.5);return bias;}

// –– Notifications ––
function notifSupported(){return typeof Notification!==“undefined”;}
function scheduleNotif(title,body,delayMs){if(!notifSupported()||Notification.permission!==“granted”)return null;return setTimeout(function(){try{new Notification(title,{body:body,tag:“starter-peak”,renotify:true});}catch(e){}},delayMs);}
function cancelNotif(id){if(id)clearTimeout(id);}
function enableNotifAsync(cb){Notification.requestPermission().then(function(r){cb(r);});}

// –– Bake ratings ––
var BAKE_RATINGS=[
{cat:“crumb”,label:“Crumb”,options:[“Open”,“Even”,“Dense”,“Gummy”]},
{cat:“crust”,label:“Crust”,options:[“Crispy”,“Soft”,“Thick”,“Burnt”]},
{cat:“spring”,label:“Oven spring”,options:[“Great”,“Okay”,“Flat”]},
{cat:“ferment”,label:“Fermentation”,options:[“Underproofed”,“Spot on”,“Overproofed”]},
{cat:“overall”,label:“Overall”,options:[”\uD83D\uDD25 Best yet”,”\u2713 Happy”,“Meh”,”\uD83D\uDC80 Bin it”]}
];

// –– Observations ––
function generateObservations(bakeLog){
if(bakeLog.length<3)return [];
var obs=[],recent=bakeLog.slice(0,Math.min(bakeLog.length,8));
var ferments=recent.filter(function(b){return b.ratings&&b.ratings.ferment;}).map(function(b){return b.ratings.ferment;});
if(ferments.length>=3){
var under=ferments.filter(function(f){return f===“Underproofed”;}).length;
var over=ferments.filter(function(f){return f===“Overproofed”;}).length;
if(under>=Math.ceil(ferments.length*0.6))obs.push(“You’re consistently underproofing \u2014 try extending bulk fermentation by 30\u201360 minutes.”);
else if(over>=Math.ceil(ferments.length*0.6))obs.push(“You’re consistently overproofing \u2014 pull the dough earlier or reduce bulk time.”);
}
var springs=recent.filter(function(b){return b.ratings&&b.ratings.spring;}).map(function(b){return b.ratings.spring;});
if(springs.length>=3){var flat=springs.filter(function(s){return s===“Flat”;}).length;if(flat>=Math.ceil(springs.length*0.6))obs.push(“Flat oven spring is recurring \u2014 check shaping tension and scoring depth.”);}
var crumbs=recent.filter(function(b){return b.ratings&&b.ratings.crumb;}).map(function(b){return b.ratings.crumb;});
if(crumbs.length>=3){var dense=crumbs.filter(function(c){return c===“Dense”||c===“Gummy”;}).length;if(dense>=Math.ceil(crumbs.length*0.6))obs.push(“Dense or gummy crumb showing up repeatedly \u2014 likely underproofing or pulling too early.”);}
var overalls=recent.filter(function(b){return b.ratings&&b.ratings.overall;}).map(function(b){return b.ratings.overall;});
if(overalls.length>=3){
var good=overalls.filter(function(o){return o.indexOf(“Best”)>-1||o.indexOf(“Happy”)>-1;}).length;
var bad=overalls.filter(function(o){return o===“Meh”||o.indexOf(“Bin”)>-1;}).length;
if(good>=Math.ceil(overalls.length*0.7))obs.push(“Your recent bakes are consistently strong \u2014 whatever you’re doing, keep doing it.”);
else if(bad>=Math.ceil(overalls.length*0.6))obs.push(“A run of disappointing bakes \u2014 worth going back to basics and checking starter activity.”);
}
var temps=recent.filter(function(b){return b.internalTemp&&b.internalTemp>0;}).map(function(b){return b.internalTemp;});
if(temps.length>=3){var low=temps.filter(function(t){return t<96;}).length;if(low>=Math.ceil(temps.length*0.6))obs.push(“You’re pulling loaves early \u2014 internal temp often below 96\u00B0C. Target 98\u00B0C minimum.”);}
return obs;
}

// –– Constants ––
var TABS=[“Planner”,“Scheduler”,“Hydration”,“Bake”,“Bake Log”];
var TAB_ICONS=[“🍞”,”\uD83D\uDD50”,”\uD83D\uDCA7”,”\uD83D\uDD25”,”\uD83D\uDCD3”];
var RATIO_PRESETS=[
{label:“1 : 1 : 1 \u2014 same day fast”,value:1},{label:“1 : 1.5 : 1.5”,value:1.5},
{label:“1 : 2 : 2 \u2014 daily standard”,value:2},{label:“1 : 3 : 3 \u2014 balanced rise”,value:3},
{label:“1 : 4 : 4 \u2014 overnight boost”,value:4},{label:“1 : 5 : 5 \u2014 slow build”,value:5},
{label:“1 : 6 : 6 \u2014 long ferment”,value:6},{label:“1 : 8 : 8 \u2014 extended”,value:8},
{label:“1 : 10 : 10 \u2014 maximum”,value:10},{label:“Custom ratio”,value:“custom”}
];

// –– Bake vessels ––
var BAKE_VESSELS=[
{id:“dutch”,label:“Dutch oven”,icon:”\uD83E\uDED5”,note:“Best steam. Cast iron holds heat evenly.”},
{id:“clam”,label:“Steel + clamshell”,icon:”\uD83E\uDD4F”,note:“Steel with a lid to trap steam. Lighter than cast iron, heats faster.”},
{id:“open”,label:“Open steel/stone”,icon:”\u2601\uFE0F”,note:“Needs a separate steam source. Full crust exposure.”},
{id:“tin”,label:“Sandwich tin”,icon:“🍞”,note:“No steam needed for enriched. Good for soft-crusted loaves.”}
];

// –– Inclusions ––
var INCLUSION_GROUPS=[
{group:“None”,items:[{id:“none”,label:“None \u2014 plain dough”,tempAdj:0,timeAdj:0,note:null}]},
{group:“Nuts & Seeds”,items:[
{id:“nuts”,label:“Nuts \u2014 walnuts, pecans, hazelnuts”,tempAdj:-5,timeAdj:3,note:“Toast nuts first \u2014 intensifies flavour and prevents mealy texture.”},
{id:“seeds”,label:“Seeds \u2014 sesame, sunflower, poppy”,tempAdj:0,timeAdj:2,note:“Soak seeds in equal weight of water overnight before adding.”}
]},
{group:“Fruit”,items:[
{id:“fruit”,label:“Dried fruit \u2014 raisins, cranberries, apricot”,tempAdj:-10,timeAdj:5,note:“Sugar in dried fruit browns fast \u2014 watch crust from 15 min into the uncovered phase.”}
]},
{group:“Savoury \u2014 Alliums & Spice”,items:[
{id:“onion”,label:“Caramelised or roasted onion”,tempAdj:-10,timeAdj:4,note:“Caramelised onion adds sugar \u2014 crust browns faster than a plain loaf.”},
{id:“jalapeno”,label:“Jalape\u00F1os (fresh or pickled)”,tempAdj:-5,timeAdj:2,note:“Pickled jalape\u00F1os add acidity and moisture \u2014 pat dry before folding in.”},
{id:“garlic”,label:“Roasted garlic / fresh herbs”,tempAdj:0,timeAdj:0,note:“Roast garlic before adding \u2014 raw garlic can inhibit fermentation.”}
]},
{group:“Savoury \u2014 Cheese & Oil-Cured”,items:[
{id:“cheese”,label:“Cheese \u2014 cheddar, gruy\u00E8re, parmesan”,tempAdj:-5,timeAdj:3,note:“Fat from cheese can cause burning on top \u2014 check at 20 min and tent with foil if darkening.”},
{id:“olives”,label:“Olives / sun-dried tomatoes”,tempAdj:-5,timeAdj:3,note:“Oil-cured inclusions add fat \u2014 reduce hydration by a few percent. Drain and pat dry.”}
]},
{group:“Sweet”,items:[
{id:“chocolate”,label:“Chocolate chips / chopped chocolate”,tempAdj:-15,timeAdj:5,note:“Chocolate burns very easily. Use the lower end of the temperature range. Dark 70%+ is most stable.”}
]}
];
var INCLUSION_OPTIONS=[];
for(var _ig=0;_ig<INCLUSION_GROUPS.length;_ig++){var _g=INCLUSION_GROUPS[_ig];for(var _ii=0;_ii<_g.items.length;_ii++)INCLUSION_OPTIONS.push(_g.items[_ii]);}

// –– Bake plan ––
function getBakePlan(vessel,doughType,loafSizeG,inclusions,convection){
var isEnriched=doughType===“enriched”,isTin=vessel===“tin”,isOpen=vessel===“open”,isDutch=vessel===“dutch”,isClam=vessel===“clam”;
var preheatC,phase1C,phase2C;
if(isEnriched){preheatC=180;phase1C=175;phase2C=170;}
else if(isTin){preheatC=230;phase1C=220;phase2C=200;}
else if(isOpen){preheatC=260;phase1C=230;phase2C=220;}
else if(isClam){preheatC=260;phase1C=235;phase2C=225;}
else{preheatC=260;phase1C=230;phase2C=230;}
var convAdj=convection&&!isDutch&&!isClam?-15:0;
var sizeAdj=0;
if(loafSizeG<700)sizeAdj=-5;else if(loafSizeG>1000)sizeAdj=8;else if(loafSizeG>800)sizeAdj=4;
var incTempAdj=0,incTimeAdj=0,incNotes=[];
for(var i=0;i<inclusions.length;i++){
var inc=INCLUSION_OPTIONS.filter(function(o){return o.id===inclusions[i];})[0];
if(inc&&inc.id!==“none”){incTempAdj+=inc.tempAdj;incTimeAdj+=inc.timeAdj;if(inc.note)incNotes.push(inc.note);}
}
incTempAdj=Math.max(incTempAdj,-20);
var fp1=phase1C+convAdj+incTempAdj,fp2=phase2C+convAdj+incTempAdj,fpre=preheatC+(convection&&!isDutch&&!isClam?-15:0);
var internalTarget=isEnriched?88:98;

if(isDutch){
var cov=20+Math.round(sizeAdj*0.4)+Math.round(incTimeAdj*0.3),uncov=20+sizeAdj+incTimeAdj;
return{vessel:vessel,doughType:doughType,preheatC:fpre,phases:[
{label:“Preheat Dutch oven”,temp:fpre,mins:null,detail:“With lid off. Continue 10\u201315 min after oven reaches temp.”},
{label:“Load & cover”,temp:fp1,mins:””+cov,detail:“Reduce heat when loading. Lid traps steam \u2014 don’t open early.”},
{label:“Remove lid”,temp:fp2,mins:””+uncov,detail:“Bake uncovered until deep golden brown. Check at “+(uncov-5)+” min.”}
],totalMins:cov+uncov,internalTarget:internalTarget,
steamNote:“Steam is created naturally inside the Dutch oven \u2014 no steam tray needed.”,
fanNote:“Fan not needed while lid is on. Can help after lid comes off.”,incNotes:incNotes};}

if(isClam){
var cov2=18+Math.round(sizeAdj*0.4)+Math.round(incTimeAdj*0.3),uncov2=22+sizeAdj+incTimeAdj;
return{vessel:vessel,doughType:doughType,preheatC:fpre,phases:[
{label:“Preheat steel + clamshell”,temp:fpre,mins:null,detail:“Preheat both steel and clamshell lid for at least 45 min. Steel heats faster than cast iron but needs full saturation.”},
{label:“Load & cover”,temp:fp1,mins:””+cov2,detail:“Score and load quickly. The clamshell traps steam for a strong oven spring.”},
{label:“Remove lid”,temp:fp2,mins:””+uncov2,detail:“Remove clamshell and bake uncovered for colour. Check at “+(uncov2-5)+” min.”}
],totalMins:cov2+uncov2,internalTarget:internalTarget,
steamNote:“Steam trapped by the clamshell lid \u2014 no separate steam source needed.”,
fanNote:“Fan not needed while lid is on. Optional after lid removal for even browning.”,incNotes:incNotes};}

if(isTin){
var sm=25+Math.round(sizeAdj*0.5),um=15+Math.round(sizeAdj*0.5)+incTimeAdj;
return{vessel:vessel,doughType:doughType,preheatC:fpre,phases:[
{label:“Preheat oven”,temp:fpre,mins:null,detail:“Place a pan of water on the bottom rack before loading.”},
{label:“Bake with steam”,temp:fp1,mins:””+sm,detail:isEnriched?“Enriched dough doesn’t need steam \u2014 skip the water pan.”:“Water pan on bottom rack provides steam for oven spring.”},
{label:“Remove steam, bake on”,temp:fp2,mins:””+um,detail:“Remove water pan. Continue until golden on top. Check at “+(um-5)+” min.”}
],totalMins:sm+um,internalTarget:internalTarget,
steamNote:isEnriched?“Enriched doughs don’t benefit from steam \u2014 skip the water pan entirely.”:“Add a pan of boiling water to the bottom rack. Remove after the steam phase.”,
fanNote:“Fan off recommended for sandwich loaves \u2014 keeps crust soft.”,
tinTip:“Optional: place a second tin of the same size on top to trap steam like a mini Dutch oven.”,incNotes:incNotes};}

var sm2=20+Math.round(sizeAdj*0.4),um2=20+sizeAdj+incTimeAdj;
return{vessel:vessel,doughType:doughType,preheatC:fpre,phases:[
{label:“Preheat stone/steel”,temp:fpre,mins:null,detail:“At least 45\u201360 min for full saturation. Don’t rush the preheat.”},
{label:“Bake with steam”,temp:fp1,mins:””+sm2,detail:“Steam tray or ice cubes on bottom rack. Score and load quickly.”},
{label:“Remove steam, bake on”,temp:fp2,mins:””+um2,detail:“Remove steam source. Bake until deep golden. Check at “+(um2-5)+” min.”}
],totalMins:sm2+um2,internalTarget:internalTarget,
steamNote:“Steam must be added \u2014 tray of boiling water or ice cubes on bottom rack.”,
fanNote:“Fan can help even browning. Lower temp by 15\u00B0C if using fan.”,incNotes:incNotes};
